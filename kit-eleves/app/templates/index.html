<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskManager – DevSecOps ESGI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 1.5rem 2rem; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #38bdf8; }
    header span { font-size: 0.8rem; background: #0ea5e9; color: white; padding: 2px 8px; border-radius: 9999px; }
    main { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=text] { width: 100%; padding: 0.6rem 1rem; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; outline: none; }
    input[type=text]:focus { border-color: #38bdf8; }
    button { padding: 0.6rem 1.2rem; background: #0ea5e9; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    button:hover { background: #38bdf8; }
    .task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; background: #0f172a; border: 1px solid #1e293b; transition: border-color 0.2s; }
    .task-item:hover { border-color: #334155; }
    .task-item.done .task-title { text-decoration: line-through; color: #64748b; }
    .task-title { flex: 1; font-size: 0.95rem; }
    .btn-done { background: #10b981; padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-done:hover { background: #34d399; }
    .btn-del { background: #ef4444; padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn-del:hover { background: #f87171; }
    .empty { color: #475569; font-style: italic; text-align: center; padding: 1rem; }
    .form-row { display: flex; gap: 0.75rem; }
  </style>
</head>
<body>
  <header>
    <h1>TaskManager</h1>
    <span>DevSecOps ESGI 5A</span>
  </header>
  <main>
    <div class="card">
      <h2>Nouvelle tâche</h2>
      <div class="form-row">
        <input type="text" id="newTitle" placeholder="Titre de la tâche..." />
        <button onclick="createTask()">Ajouter</button>
      </div>
    </div>
    <div class="card">
      <h2>Tâches</h2>
      <ul class="task-list" id="taskList">
        <li class="empty">Chargement…</li>
      </ul>
    </div>
  </main>
  <script>
    async function loadTasks() {
      const res = await fetch('/tasks');
      const tasks = await res.json();
      const ul = document.getElementById('taskList');
      if (!tasks.length) { ul.innerHTML = '<li class="empty">Aucune tâche.</li>'; return; }
      ul.innerHTML = tasks.map(t => `
        <li class="task-item ${t.done === 'true' ? 'done' : ''}" id="t-${t.id}">
          <span class="task-title">${t.title}</span>
          ${t.done !== 'true' ? `<button class="btn-done" onclick="markDone('${t.id}')">✓</button>` : ''}
          <button class="btn-del" onclick="deleteTask('${t.id}')">✕</button>
        </li>`).join('');
    }
    async function createTask() {
      const input = document.getElementById('newTitle');
      if (!input.value.trim()) return;
      await fetch('/tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: input.value.trim()}) });
      input.value = '';
      loadTasks();
    }
    async function markDone(id) {
      await fetch(`/tasks/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({done: true}) });
      loadTasks();
    }
    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }
    document.getElementById('newTitle').addEventListener('keydown', e => { if (e.key === 'Enter') createTask(); });
    loadTasks();
  </script>
</body>
</html>
