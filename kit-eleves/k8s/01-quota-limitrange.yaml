apiVersion: v1
kind: ResourceQuota
metadata:
  name: taskmanager-quota
  namespace: taskmanager
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "1Gi"
    limits.cpu: "4"
    limits.memory: "1Gi"
    pods: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: taskmanager-limits
  namespace: taskmanager
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "1"
        memory: "512Mi"